<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Détection formulaire Netlify</title>
  </head>
  <body>
    <form name="diagnostic-quai-west" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/success.html">
      <input type="hidden" name="form-name" value="diagnostic-quai-west" />
      <p style="display:none">
        <label>Ne pas remplir : <input name="bot-field" /></label>
      </p>
      <input name="marque" />
      <input name="projet" />
      <input name="support" />
      <input name="surface" />
      <input name="niveau" />
      <input name="priorite" />
      <input name="produit_recommande" />
      <input name="prenom" />
      <input name="email" type="email" />
      <input name="telephone" />
      <textarea name="commentaire"></textarea>
      <input name="optin" />
    </form>
  </body>
</html>

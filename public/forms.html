<!doctype html>
<html lang="fr">
  <head><meta charset="utf-8" /><title>Détection formulaire Netlify</title></head>
  <body>
    <form name="diagnostic-quai-west" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/success.html">
      <input type="hidden" name="form-name" value="diagnostic-quai-west" />
      <p style="display:none"><label>Ne pas remplir : <input name="bot-field" /></label></p>
      <input name="marque" />
      <input name="projet" />
      <input name="projet_kormatek" />
      <input name="etat_kormatek" />
      <input name="rendu_kormatek" />
      <input name="support" />
      <input name="surface" />
      <input name="niveau" />
      <input name="priorite" />
      <input name="produit_recommande" />
      <input name="forme_piscine" />
      <input name="dimensions_piscine" />
      <input name="surface_piscine" />
      <input name="dimensions_objet" />
      <input name="volume_objet" />
      <textarea name="quantites"></textarea>
      <textarea name="panier_conseille"></textarea>
      <textarea name="erreur_a_eviter"></textarea>
      <input name="prix_estime_min" />
      <input name="prix_estime_max" />
      <input name="prenom" />
      <input name="email" type="email" />
      <input name="telephone" />
      <textarea name="commentaire"></textarea>
      <input name="optin" />
    </form>
  </body>
</html>
